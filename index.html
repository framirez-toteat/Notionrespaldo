<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procesos SAC</title>
<script src="pages.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Login */
  #login-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: #1e1e2e;
    display: flex; align-items: center; justify-content: center;
  }
  #login-box {
    background: #2a2a3e; border-radius: 12px;
    padding: 40px 36px; width: 320px;
    display: flex; flex-direction: column; gap: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #login-box h2 { color: #fff; font-size: 20px; font-weight: 600; text-align: center; }
  #login-box p  { color: #9b9b9b; font-size: 13px; text-align: center; margin-top: -8px; }
  #login-input {
    padding: 10px 14px; border-radius: 7px;
    border: 1px solid #3a3a52; background: #1e1e2e;
    color: #fff; font-size: 14px; outline: none;
  }
  #login-input:focus { border-color: #7c6af7; }
  #login-btn {
    padding: 10px; border-radius: 7px; border: none;
    background: #7c6af7; color: #fff; font-size: 14px;
    font-weight: 600; cursor: pointer;
  }
  #login-btn:hover { background: #6a59e0; }
  #login-error {
    color: #ff6b6b; font-size: 12px; text-align: center;
    display: none;
  }

  :root {
    --sidebar-w: 300px;
    --bg: #f7f7f5;
    --sidebar-bg: #1e1e2e;
    --sidebar-hover: #2a2a3e;
    --sidebar-active: #3b3b55;
    --accent: #7c6af7;
    --text: #37352f;
    --text-light: #9b9b9b;
    --folder-color: #a8a8c0;
    --border: #e0e0e0;
  }

  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* Layout */
  #app { display: flex; height: 100vh; }

  /* Sidebar */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.2s;
  }
  #sidebar.collapsed { width: 48px; min-width: 48px; }

  #sidebar-header {
    padding: 16px 12px 12px;
    border-bottom: 1px solid #2d2d42;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #toggle-btn {
    background: none; border: none; cursor: pointer;
    color: var(--folder-color); font-size: 18px; flex-shrink: 0;
    width: 24px; display: flex; align-items: center; justify-content: center;
  }
  #sidebar-title {
    color: #fff; font-weight: 600; font-size: 14px;
    white-space: nowrap; overflow: hidden;
  }
  #sidebar.collapsed #sidebar-title,
  #sidebar.collapsed #search-wrap { display: none; }

  #search-wrap { padding: 10px 12px; }
  #search {
    width: 100%; padding: 7px 10px;
    background: #2a2a3e; border: 1px solid #3a3a52; border-radius: 6px;
    color: #fff; font-size: 13px; outline: none;
  }
  #search::placeholder { color: var(--folder-color); }
  #search:focus { border-color: var(--accent); }

  #nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 20px; }
  #nav::-webkit-scrollbar { width: 4px; }
  #nav::-webkit-scrollbar-track { background: transparent; }
  #nav::-webkit-scrollbar-thumb { background: #3a3a52; border-radius: 2px; }

  /* Tree nodes */
  .folder-item { user-select: none; }
  .folder-label {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; cursor: pointer; color: var(--folder-color);
    font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    white-space: nowrap; overflow: hidden;
  }
  .folder-label:hover { background: var(--sidebar-hover); }
  .folder-icon { font-size: 10px; flex-shrink: 0; transition: transform 0.15s; }
  .folder-item.open > .folder-label .folder-icon { transform: rotate(90deg); }
  .folder-name { overflow: hidden; text-overflow: ellipsis; }

  .folder-children { display: none; }
  .folder-item.open > .folder-children { display: block; }

  .page-link {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 12px 5px 20px;
    color: #c8c8d8; font-size: 13px; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-decoration: none; border-left: 2px solid transparent;
  }
  .page-link:hover { background: var(--sidebar-hover); color: #fff; }
  .page-link.active { background: var(--sidebar-active); color: #fff; border-left-color: var(--accent); }
  .page-link .page-icon { font-size: 12px; flex-shrink: 0; opacity: 0.6; }

  /* indent levels */
  .depth-2 .page-link { padding-left: 28px; }
  .depth-3 .page-link { padding-left: 40px; }
  .depth-4 .page-link { padding-left: 52px; }
  .depth-5 .page-link { padding-left: 64px; }

  .depth-2 > .folder-label { padding-left: 24px; }
  .depth-3 > .folder-label { padding-left: 36px; }
  .depth-4 > .folder-label { padding-left: 48px; }

  /* Collapsed sidebar: show only icons */
  #sidebar.collapsed .page-link { padding: 7px 0; justify-content: center; border-left: none; }
  #sidebar.collapsed .page-link span:last-child { display: none; }
  #sidebar.collapsed .folder-label { display: none; }

  /* Main content */
  #main {
    flex: 1; display: flex; flex-direction: column;
    background: var(--bg); overflow: hidden;
  }

  #topbar {
    padding: 12px 20px; background: #fff; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  #breadcrumb { font-size: 13px; color: var(--text-light); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #breadcrumb span { color: var(--text); font-weight: 500; }

  #open-btn {
    font-size: 12px; padding: 5px 12px;
    background: none; border: 1px solid var(--border); border-radius: 5px;
    cursor: pointer; color: var(--text-light);
    white-space: nowrap;
  }
  #open-btn:hover { border-color: var(--accent); color: var(--accent); }

  #logout-btn {
    font-size: 12px; padding: 5px 12px;
    background: none; border: 1px solid var(--border); border-radius: 5px;
    cursor: pointer; color: var(--text-light); white-space: nowrap;
  }
  #logout-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

  #role-badge {
    font-size: 11px; padding: 3px 8px; border-radius: 10px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  #role-badge.admin  { background: #ede9ff; color: #7c6af7; }
  #role-badge.general { background: #e8f5e9; color: #2e7d32; }

  #content-frame {
    flex: 1; border: none; background: #fff;
  }

  #welcome {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: var(--text-light);
    gap: 12px;
  }
  #welcome h2 { font-size: 22px; color: var(--text); font-weight: 600; }
  #welcome p { font-size: 14px; }
  #welcome .count { font-size: 40px; }

  /* Search results highlight */
  .page-link mark { background: #ffd700; color: #000; border-radius: 2px; }

  #no-results {
    padding: 20px 16px; color: var(--folder-color); font-size: 13px; text-align: center;
    display: none;
  }
</style>
</head>
<body>
<div id="login-screen">
  <div id="login-box">
    <h2>🔒 Procesos SAC</h2>
    <p>Ingresa la contraseña para continuar</p>
    <input id="login-input" type="password" placeholder="Contraseña" autofocus>
    <button id="login-btn">Ingresar</button>
    <div id="login-error">Contraseña incorrecta</div>
  </div>
</div>

<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <button id="toggle-btn" title="Colapsar sidebar">☰</button>
      <span id="sidebar-title">Procesos SAC</span>
    </div>
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Buscar página..." autocomplete="off" spellcheck="false">
    </div>
    <nav id="nav">
      <div id="no-results">Sin resultados</div>
    </nav>
  </aside>

  <main id="main">
    <div id="topbar">
      <div id="breadcrumb">Selecciona una página</div>
      <button id="open-btn" style="display:none" onclick="openInNewTab()">Abrir en nueva pestaña ↗</button>
      <span id="role-badge"></span>
      <button id="logout-btn" onclick="logout()" title="Cerrar sesión">🔒 Salir</button>
    </div>
    <div id="welcome">
      <div class="count">📄</div>
      <h2>Procesos SAC</h2>
      <p id="page-count"></p>
      <p>Selecciona una página en el panel izquierdo para comenzar.</p>
    </div>
    <iframe id="content-frame" style="display:none"></iframe>
  </main>
</div>

<script>
const PASSWORD_TEAM  = "SACTECH2025";
const PASSWORD_ADMIN = "AdminSACTECH2025";

let accessLevel = 0; // 0 = sin acceso, 1 = equipo, 2 = admin

(function checkAuth() {
  const stored = sessionStorage.getItem('sac_level');
  if (stored === '1' || stored === '2') {
    accessLevel = parseInt(stored);
    document.getElementById('login-screen').style.display = 'none';
    return;
  }
  const btn   = document.getElementById('login-btn');
  const input = document.getElementById('login-input');
  const error = document.getElementById('login-error');
  function attempt() {
    if (input.value === PASSWORD_ADMIN) {
      accessLevel = 2;
      sessionStorage.setItem('sac_level', '2');
      document.getElementById('login-screen').style.display = 'none';
      init();
    } else if (input.value === PASSWORD_TEAM) {
      accessLevel = 1;
      sessionStorage.setItem('sac_level', '1');
      document.getElementById('login-screen').style.display = 'none';
      init();
    } else {
      error.style.display = 'block';
      input.value = '';
      input.focus();
    }
  }
  btn.addEventListener('click', attempt);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
})();

let pages = [];
let currentPath = null;

function init() {
  const all = window.PAGES || [];
  pages = accessLevel === 2
    ? all
    : all.filter(p => !p.folder.includes('Proyectos') && !p.path.includes('Proyectos'));
  document.getElementById('page-count').textContent = `${pages.length} páginas disponibles`;
  buildTree(pages);
  const badge = document.getElementById('role-badge');
  if (accessLevel === 2) { badge.textContent = 'Admin'; badge.className = 'admin'; }
  else { badge.textContent = 'General'; badge.className = 'general'; }
}

function buildTree(list) {
  const nav = document.getElementById('nav');
  [...nav.querySelectorAll('.folder-item, .page-link')].forEach(el => el.remove());

  if (list.length === 0) {
    document.getElementById('no-results').style.display = 'block';
    return;
  }
  document.getElementById('no-results').style.display = 'none';

  // Map: folderPath -> {el, childrenEl}
  const folderEls = {};

  function ensureFolder(folderPath) {
    if (folderEls[folderPath]) return folderEls[folderPath];

    const parts = folderPath.split('/');
    const depth = parts.length;
    const name = parts[parts.length - 1];
    const parentPath = parts.slice(0, -1).join('/');

    const item = document.createElement('div');
    item.className = `folder-item depth-${depth}`;

    const label = document.createElement('div');
    label.className = 'folder-label';
    label.style.paddingLeft = (12 + (depth - 1) * 14) + 'px';
    label.innerHTML = `<span class="folder-icon">▶</span><span class="folder-name">${name}</span>`;
    label.onclick = () => item.classList.toggle('open');

    const children = document.createElement('div');
    children.className = 'folder-children';

    item.appendChild(label);
    item.appendChild(children);
    folderEls[folderPath] = { el: item, childrenEl: children };

    // Attach to parent
    if (parentPath) {
      const parent = ensureFolder(parentPath);
      parent.childrenEl.appendChild(item);
    } else {
      nav.insertBefore(item, document.getElementById('no-results'));
    }

    return folderEls[folderPath];
  }

  // Collect and sort all unique folder paths
  const allFolders = [...new Set(list.map(p => p.folder).filter(Boolean))].sort((a, b) => a.localeCompare(b));
  allFolders.forEach(f => ensureFolder(f));

  // Add pages
  for (const page of list) {
    const f = page.folder || '';
    const depth = f ? f.split('/').length + 1 : 1;
    const link = document.createElement('a');
    link.className = 'page-link';
    link.style.paddingLeft = (20 + (depth - 1) * 14) + 'px';
    link.setAttribute('data-path', page.path);
    link.setAttribute('href', '#');
    link.innerHTML = `<span class="page-icon">📄</span><span>${page.title}</span>`;
    link.onclick = (e) => { e.preventDefault(); loadPage(page.path, page.title, page.folder); };
    if (page.path === currentPath) link.classList.add('active');

    if (f && folderEls[f]) {
      folderEls[f].childrenEl.appendChild(link);
    } else {
      nav.insertBefore(link, document.getElementById('no-results'));
    }
  }

  // Auto-open folders containing the active page
  if (currentPath) {
    const active = nav.querySelector('.page-link.active');
    if (active) openParents(active);
  }
}

function openParents(el) {
  let parent = el.parentElement;
  while (parent && parent.id !== 'nav') {
    if (parent.classList.contains('folder-item')) parent.classList.add('open');
    parent = parent.parentElement;
  }
}

function injectMediaFallbacks(frame) {
  try {
    const doc = frame.contentDocument;
    if (!doc) return;

    const style = doc.createElement('style');
    style.textContent = `
      .media-missing {
        display: flex; align-items: center; gap: 10px;
        background: #fff8e1; border: 1px dashed #f0b429;
        border-radius: 6px; padding: 12px 16px; margin: 8px 0;
        font-family: sans-serif; font-size: 13px; color: #7a5c00;
      }
      .media-missing-icon { font-size: 20px; flex-shrink: 0; }
    `;
    doc.head.appendChild(style);

    const placeholder = (type, name) => {
      const div = doc.createElement('div');
      div.className = 'media-missing';
      div.innerHTML = `<span class="media-missing-icon">${type === 'video' ? '🎬' : '🖼️'}</span>
        <span><strong>Archivo no disponible</strong><br>${name || 'Este archivo supera el límite de GitHub y no fue incluido.'}</span>`;
      return div;
    };

    doc.querySelectorAll('img').forEach(img => {
      img.addEventListener('error', () => {
        img.replaceWith(placeholder('img', img.src.split('/').pop()));
      });
    });

    doc.querySelectorAll('video, source').forEach(el => {
      const tag = el.tagName === 'VIDEO' ? el : el.closest('video');
      if (!tag) return;
      tag.addEventListener('error', () => {
        const src = tag.querySelector('source')?.src || tag.src || '';
        tag.replaceWith(placeholder('video', src.split('/').pop()));
      });
      if (tag.readyState === 0) tag.dispatchEvent(new Event('error'));
    });
  } catch (e) {}
}

function loadPage(path, title, folder) {
  currentPath = path;
  document.getElementById('welcome').style.display = 'none';
  const frame = document.getElementById('content-frame');
  frame.style.display = 'block';
  frame.onload = () => injectMediaFallbacks(frame);
  frame.src = path.split('/').map(encodeURIComponent).join('/');

  // Breadcrumb
  const parts = folder ? folder.split('/') : [];
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = parts.map(p => `${p}`).join(' / ') + (parts.length ? ' / ' : '') + `<span>${title}</span>`;

  document.getElementById('open-btn').style.display = 'inline-block';

  // Update active link
  document.querySelectorAll('.page-link').forEach(l => {
    l.classList.toggle('active', l.getAttribute('data-path') === path);
  });

  // Open parents
  const active = document.querySelector('.page-link.active');
  if (active) openParents(active);
}

function openInNewTab() {
  if (currentPath) window.open(currentPath, '_blank');
}

function logout() {
  sessionStorage.removeItem('sac_level');
  location.reload();
}

// Search
let searchTimer;
document.getElementById('search').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => filterPages(this.value.trim()), 150);
});

function filterPages(query) {
  if (!query) {
    buildTree(pages);
    return;
  }
  const q = query.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  const filtered = pages.filter(p => {
    const t = p.title.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    const f = p.folder.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    return t.includes(q) || f.includes(q);
  });
  buildTree(filtered);
  // Auto-open all folders in search results
  document.querySelectorAll('.folder-item').forEach(el => el.classList.add('open'));
}

// Sidebar toggle
document.getElementById('toggle-btn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('collapsed');
});

init();
</script>
</body>
</html>
