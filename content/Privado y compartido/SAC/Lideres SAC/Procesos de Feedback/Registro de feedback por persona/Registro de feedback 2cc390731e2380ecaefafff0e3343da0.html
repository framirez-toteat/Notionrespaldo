<div style="display:contents" dir="auto"><p id="2cc39073-1e23-807c-b0e2-caaac899a844" class=""><strong>Sensación general a la fecha del compañero</strong></p></div><div style="display:contents" dir="auto"><p id="2cc39073-1e23-801b-8f8c-ce4258468252" class="">Se ha sentido colapsada, pero ya va sintiéndose mejor, se siente bien porque ha aprendido bastante, se ha refugiado en ciertos compañeros, Diego, jessi, Nico, Cris.</p></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="2cc39073-1e23-8029-918b-f97d878dc956"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%"><div style="display:contents" dir="auto"><p id="2cc39073-1e23-8097-a110-df93cc302995" class=""><strong>Indicadores a la fecha </strong>(solo datos)</p></div><div style="display:contents" dir="auto"><p id="2cc39073-1e23-8084-bfe6-fa315c1f654b" class="">CSAT: 93,8 %<div class="indented"><div style="display:contents" dir="auto"><p id="2ce39073-1e23-8014-9f74-f606b6304bb3" class="">promedio equipo 96,5 %</p></div><div style="display:contents" dir="auto"><p id="2ce39073-1e23-80d9-87c2-ebc3e64153d9" class="">promedio ingresos 94,2 %</p></div></div></p></div><div style="display:contents" dir="auto"><p id="2cc39073-1e23-80f1-9bb0-f710bb5f3b04" class="">TME 30 Seg: Logrado en 244 Conversaciones / 47.8%</p></div><div style="display:contents" dir="auto"><p id="2cc39073-1e23-808c-ba3d-f05db077f5cd" class="">TMO 25 Min: Logrado en 323 Conversaciones / 63.3%</p></div><div style="display:contents" dir="auto"><p id="2cc39073-1e23-8065-81c3-c246d6123271" class="">CX Score: 3,7</p></div><div style="display:contents" dir="auto"><p id="2ce39073-1e23-8070-876d-f4bff2a5ab97" class="">Conversaciones: 510<div class="indented"><div style="display:contents" dir="auto"><p id="2ce39073-1e23-806c-ba71-cd2ceb0e20f0" class="">promedio equipo: 1.120 </p></div><div style="display:contents" dir="auto"><p id="2ce39073-1e23-8098-87d2-debc1f35854b" class="">promedio ingresos: 420</p></div></div></p></div><div style="display:contents" dir="auto"><p id="2ce39073-1e23-80fb-843e-e9c79f688840" class="">Ranking evaluación de conocimientos: 14/19</p></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="2cc39073-1e23-809c-b50e-d3cbcedd3597"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%"><div style="display:contents" dir="auto"><p id="2cc39073-1e23-80dc-ae70-c02fc19ed2e1" class=""><strong>Participación y cumplimiento de responsabilidades</strong></p></div><div style="display:contents" dir="auto"><ul id="2cc39073-1e23-803f-bd18-cf9e383d6471" class="bulleted-list"><li style="list-style-type:disc">Participación en el equipo: Participa, consulta y esta atenta la información entregada en el canal.</li></ul></div><div style="display:contents" dir="auto"><ul id="2cc39073-1e23-80c5-8676-ec68669be6a8" class="bulleted-list"><li style="list-style-type:disc">Conexiones: OK</li></ul></div><div style="display:contents" dir="auto"><ul id="2d539073-1e23-80ff-b208-f718115e7d0d" class="bulleted-list"><li style="list-style-type:disc"><strong>Fortalezas</strong>: Muy efectiva resolviendo problemas de configuración de impresoras y cierres de caja mediante soporte remoto, logrando calificaciones de <strong>5</strong> en múltiples casos. Proporciona respuestas claras cuando el cliente tiene dudas sobre procesos específicos.</li></ul></div><div style="display:contents" dir="auto"><ul id="2d539073-1e23-8051-90c6-e0f91e677ca1" class="bulleted-list"><li style="list-style-type:disc"><strong>Áreas de mejora</strong>: Se observan calificaciones bajas (<strong>2</strong>) en situaciones donde los problemas técnicos (como restricciones de antivirus o fallos de impresión complejos) no se resolvieron o cuando el chat se cerró por tiempo de respuesta sin una solución clara.</li></ul></div><div style="display:contents" dir="auto"><ul id="2cc39073-1e23-800d-88b6-f92d27b997f5" class="toggle"><li><details open=""><summary>Hallazgos de casos auditados.</summary><div style="display:contents" dir="auto"><ul id="2d539073-1e23-80a2-b73c-ced8db0dfbbf" class="bulleted-list"><li style="list-style-type:disc"><a href="https://app.intercom.com/a/inbox/nry7bg4q/inbox/admin/9066748/conversation/215472367683624?view=List">Reinicio TPS</a>: Gestión Ok, cliente confirma pero no se le consulta si requiere ayuda en algo adicional.</li></ul></div><div style="display:contents" dir="auto"><ul id="2d539073-1e23-80f0-b660-c2ccc7e340d7" class="bulleted-list"><li style="list-style-type:disc"><a href="https://app.intercom.com/a/inbox/nry7bg4q/inbox/admin/9066748/conversation/215472339340008?view=List">Impresora en error</a>: se realiza el proceso de sub, se le indica al cliente que pruebe, el cliente indica aun no poder imprimir comanda, se procede a cerrar el chat dejando al cliente sin respuestas, indicando que el cliente no siguió conversación.</li></ul></div><div style="display:contents" dir="auto"><ul id="2d539073-1e23-8014-8b7c-f7e3c7c4482e" class="bulleted-list"><li style="list-style-type:disc"><a href="https://app.intercom.com/a/inbox/nry7bg4q/inbox/admin/9066748/conversation/215472331191241?view=List">Liberación de mesa</a>: Ok, apoya al cliente, le consulta si le puede apoyar en algo mas. </li></ul></div><div style="display:contents" dir="auto"><ul id="2d539073-1e23-8030-ad63-edd71828ded0" class="bulleted-list"><li style="list-style-type:disc"><a href="https://app.intercom.com/a/inbox/nry7bg4q/inbox/admin/9066748/conversation/215472300528176?view=List">Gestion de extras</a>: Indica el proceso al cliente pero el proceso no es completamente correcto, ya que el proceso indicado fue para productos y no extras, aunque el proceso sea el mismo, si no se le indica el exacto al cliente este puede cometer errores por bajo la indicación recibida.</li></ul></div><div style="display:contents" dir="auto"><p id="2d539073-1e23-805e-a8c3-c53c1199b1ad" class=""> </p></div></details></li></ul></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="2cc39073-1e23-804f-add3-f3500b8cef06"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%"><div style="display:contents" dir="auto"><p id="2cc39073-1e23-8083-b70f-ed2b05bd0816" class=""><strong>Compromisos y acuerdo de metas</strong></p></div><div style="display:contents" dir="auto"><ul id="2cc39073-1e23-807c-b8e7-dfdfba32ab36" class="bulleted-list"><li style="list-style-type:disc">No cerrar los chats sin dar respuesta al cliente, esperar 15 min antes de cualquier cierre.</li></ul></div><div style="display:contents" dir="auto"><ul id="2d539073-1e23-80f4-ae4b-d1eaaf9b5874" class="bulleted-list"><li style="list-style-type:disc">Consultar los procesos si existen dudas en la info que se le va a entregar al cliente, verificar siempre que la info que entregamos sera la correcta entiendo que puede ser un mismo procesos para diferentes configuraciones</li></ul></div><div style="display:contents" dir="auto"><ul id="2d539073-1e23-8037-b35c-eb8d64ef43c8" class="bulleted-list"><li style="list-style-type:disc"> TME 50%</li></ul></div><div style="display:contents" dir="auto"><p id="2d539073-1e23-80c1-bf6a-e2b64c9fdc61" class="">

ass="" style="width:85px"><strong>CX Score</strong></td><td id="zN]b" class="">56.5%</td><td id="{oNv" class=""><strong>65.1%</strong></td><td id="uEMS" class="">🔴 <strong>Brecha Crítica (-8.6%)</strong>.</td></tr></div></tbody></table></div><div style="display:contents" dir="ltr"><figure id="32d39073-1e23-809f-8e2d-cd014ba1b700" class="image"><a href="Registro%20de%20feedback%202cc3-3da0/Code_Generated_Image_(2).png"><img style="width:592px" src="Registro%20de%20feedback%202cc3-3da0/Code_Generated_Image_(2).png"/></a><figcaption>El TME ha mejorado, pero con ello se ha arrastrado también la experiencia.</figcaption></figure></div><div style="display:contents" dir="ltr"><figure id="32d39073-1e23-80a9-b11a-fe59e79afb59" class="image"><a href="Registro%20de%20feedback%202cc3-3da0/Code_Generated_Image_(1).png"><img style="width:592px" src="Registro%20de%20feedback%202cc3-3da0/Code_Generated_Image_(1).png"/></a><figcaption>En 12 semanas: 2 veces sobre el promedio 👍🏻, 2 igual y 8 por debajo.</figcaption></figure></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="32d39073-1e23-80cf-9c86-fe511c2c17b2"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%"><div style="display:contents" dir="auto"><p id="32d39073-1e23-802d-b24a-d6ddcb22a1c2" class=""><strong>Por tipo de conversación</strong></p></div><div style="display:contents" dir="ltr"><table id="32d39073-1e23-809a-a836-f326c5ed781a" class="simple-table"><tbody><div style="display:contents" dir="ltr"><tr id="32d39073-1e23-8004-9501-ce10f7299be8"><td id="vLqO" class="" style="width:148.1875px"><strong>Motivo</strong></td><td id="cn&lt;U" class=""><strong>Casos Críticos</strong></td><td id="{[T{" class=""><strong>CX Promedio</strong></td><td id="co]v" class=""><strong>CSAT Promedio</strong></td></tr></div><div style="display:contents" dir="ltr"><tr id="32d39073-1e23-8089-be41-eec843b5edf3"><td id="vLqO" class="" style="width:148.1875px"><strong>Impresión/Boletas</strong></td><td id="cn&lt;U" class=""><strong>235</strong></td><td id="{[T{" class="">1.98</td><td id="co]v" class=""><strong>2.3</strong></td></tr></div><div style="display:contents" dir="ltr"><tr id="32d39073-1e23-80e6-b26a-dc5ce63411d5"><td id="vLqO" class="" style="width:148.1875px"><strong>Facturación/Pagos</strong></td><td id="cn&lt;U" class="">67</td><td id="{[T{" class="">2.00</td><td id="co]v" class="">2.0</td></tr></div><div style="display:contents" dir="ltr"><tr id="32d39073-1e23-803a-b6db-f0a1b475fa21"><td id="vLqO" class="" style="width:148.1875px"><strong>Stock/Inventario</strong></td><td id="cn&lt;U" class="">11</td><td id="{[T{" class="">2.00</td><td id="co]v" class=""><strong>1.0</strong></td></tr></div><div style="display:contents" dir="ltr"><tr id="32d39073-1e23-80ec-ba78-e3986149ad5f"><td id="vLqO" class="" style="width:148.1875px"><strong>Reportes</strong></td><td id="cn&lt;U" class="">5</td><td id="{[T{" class="">2.20</td><td id="co]v" class="">2.0</td></tr></div></tbody></table></div><div style="display:contents" dir="auto"><p id="32d39073-1e23-8074-af35-da8f0b34e4c5" class=""><strong>Los casos que mueven la aguja según el CX Score:</strong></p></div><div style="display:contents" dir="auto"><p id="32d39073-1e23-8066-8f2f-e1d3f0d341cd" class="">Das instrucciones técnicas correctas, pero si no funcionan a la primera, el cliente muestra &quot;<em>frustración intensa</em>&quot; y tiendes a cerrar el chat o escalar sin mitigar esa emoción. La IA detecta que &quot;<em>la intervención empeoró la situación</em>&quot; no por el consejo técnico, sino por la falta de acompañamiento.</p></div><div style="display:contents" dir="auto"><p id="32d39073-1e23-80cb-a69e-cc2d39a668a4" class=""><strong>Los casos que se pueden mejorar con paciencia: </strong>(compromiso en Dic 2025)</p></div><div style="display:contents" dir="auto"><p id="32d39073-1e23-802d-990c-f916b454cc7e" class="">Muchos casos de bajo CX ocurren porque das una instrucción y, al no recibir respuesta inmediata, cierras el chat. La IA penaliza esto como &quot;resolución no confirmada&quot;, lo que baja tu score drásticamente. </p></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-8009-aa18-cf41a3bddd62" class="toggle"><li><details open=""><summary>Hallazgos de casos auditados.</summary><div style="display:contents" dir="auto"><h3 id="32d39073-1e23-8027-bdb5-dd60563a4f40" class="">1. Gestión de Reportes y Conocimiento Técnico</h3></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-807e-9b47-e29617f144c8" class="bulleted-list"><li style="list-style-type:disc"><strong>Caso Andrés Flores (215473589550131):</strong><div style="display:contents" dir="auto"><ul id="32d39073-1e23-808c-b2ec-e67ac778694d" class="bulleted-list"><li style="list-style-type:circle"><strong>Fallo:</strong> El cliente es muy específico: quiere ver los agregados <em>por plato</em>. Daniela le da una respuesta genérica de cómo crear extras (copiar/pegar manual). Cuando el cliente insiste, ella lo manda a un reporte general y cierra el chat.</li></ul></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-807c-a2ff-c629cb643ce2" class="bulleted-list"><li style="list-style-type:circle"><strong>Comentario:</strong> <em>&quot;No se escucha la necesidad del cliente. Se entrega una respuesta predefinida sobre creación de productos cuando el cliente preguntaba por visualización de reportes, obligándolo a repetir su duda para finalmente no resolverla.&quot;</em></li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-8029-b1af-e6d202af02b0" class="bulleted-list"><li style="list-style-type:disc"><strong>Caso Heyna Markar (215473474763091):</strong><div style="display:contents" dir="auto"><ul id="32d39073-1e23-804a-a463-c7eb3300cf3a" class="bulleted-list"><li style="list-style-type:circle"><strong>Fallo:</strong> El cliente no ve datos después del 28 de febrero. Daniela pide una captura y, sin esperar ni un minuto tras la petición (según el flujo), pospone y luego cierra.</li></ul></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-80e5-b6c6-f47d59a77a23" class="bulleted-list"><li style="list-style-type:circle"><strong>Comentario:</strong> <em>&quot;Cierre prematuro. Ante un problema de integridad de datos (reportes que no cargan), se cierra la conversación sin investigar la causa raíz ni dar seguimiento a la captura solicitada.&quot;</em></li></ul></div></li></ul></div><div style="display:contents" dir="auto"><h3 id="32d39073-1e23-8090-9a33-cd53e2cf5612" class="">2. Protocolo de Cierre y &quot;Abandono&quot; del Cliente</h3></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-805b-931a-da90bc5b7a99" class="bulleted-list"><li style="list-style-type:disc"><strong>Caso Carla Brautigam (215473552181448):</strong><div style="display:contents" dir="auto"><ul id="32d39073-1e23-8068-971d-d19e039d08fd" class="bulleted-list"><li style="list-style-type:circle"><strong>Fallo:</strong> El cliente tiene una urgencia (no carga inventario). Daniela usa una respuesta de &quot;alto flujo&quot; para ganar tiempo y luego cierra por falta de respuesta del cliente.</li></ul></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-8081-a79c-e7fa00fe61f7" class="bulleted-list"><li style="list-style-type:circle"><strong>Comentario:</strong> <em>&quot;Uso de respuestas de &#x27;espera&#x27; para dilatar la atención. El cliente no recibe ninguna instrucción técnica y el caso se cierra sin siquiera haber iniciado el soporte.&quot;</em></li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-809d-bb23-c8abf22e8a1d" class="bulleted-list"><li style="list-style-type:disc"><strong>Caso Liset Huaccachi (Reglas de Impresión):</strong><div style="display:contents" dir="auto"><ul id="32d39073-1e23-80d5-b17b-c1add8815c9f" class="bulleted-list"><li style="list-style-type:circle"><strong>Fallo:</strong> El cliente indica que la solución no funcionó (&quot;sigue saliendo en la impresora de cocina&quot;). Daniela pide actualizar de nuevo y, acto seguido, lanza el mensaje de &quot;¿Sigues en línea?&quot; y cierra.</li></ul></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-80bf-9706-e8edb96f4117" class="bulleted-list"><li style="list-style-type:circle"><strong>Comentario:</strong> <em>&quot;Incumplimiento del compromiso de diciembre: Se cierra el chat inmediatamente después de que el cliente informa que la solución falló. No hay acompañamiento en el error, solo un cierre por inactividad forzado.&quot;</em></li></ul></div></li></ul></div><div style="display:contents" dir="auto"><h3 id="32d39073-1e23-8008-92f4-dac56784e48d" class="">3. Falta de Empatía y &quot;Esfuerzo del Cliente&quot;</h3></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-8078-a75d-faf4bb9c4cac" class="bulleted-list"><li style="list-style-type:disc"><strong>Caso Javiera Araneda (Facturación):</strong><div style="display:contents" dir="auto"><ul id="32d39073-1e23-8055-8ba4-d5851424e0b0" class="bulleted-list"><li style="list-style-type:circle"><strong>Fallo:</strong> La cliente explica que está desde un celular y no puede entrar a la plataforma, por eso pide el monto por chat. Daniela se niega a darle el dato y la manda a la plataforma que la cliente ya dijo que no puede usar.</li></ul></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-809b-b800-c30736e79c81" class="bulleted-list"><li style="list-style-type:circle"><strong>Comentario:</strong> <em>&quot;Falta de flexibilidad y empatía. Se obliga al cliente a realizar un esfuerzo innecesario (ingresar a la plataforma desde un móvil con dificultades) para obtener un dato simple (el monto) que el agente tiene a la vista.&quot;</em></li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-8069-b7dc-f9ab1b6c1f2b" class="bulleted-list"><li style="list-style-type:disc"><strong>Caso Sonia Ruiz (Propina):</strong><div style="display:contents" dir="auto"><ul id="32d39073-1e23-8038-8b8e-d56c6fdd1e6e" class="bulleted-list"><li style="list-style-type:circle"><strong>Fallo:</strong> El cliente no encuentra el aviso de propina. Daniela responde &quot;Perdona, no te entendí&quot; y cierra el chat.</li></ul></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-808b-937d-eff089704678" class="bulleted-list"><li style="list-style-type:circle"><strong>Comentario:</strong> <em>&quot;Abandono de la gestión por falta de comprensión. En lugar de indagar o pedir una aclaración distinta, se admite la falta de entendimiento y se procede a cerrar el caso.&quot;</em></li></ul></div></li></ul></div><div style="display:contents" dir="auto"><h3 id="32d39073-1e23-8077-b113-f41fd17aee34" class="">4. Soporte Técnico &quot;En Serie&quot;</h3></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-8096-90ec-e1883f242240" class="bulleted-list"><li style="list-style-type:disc"><strong>Caso Yolibeth Contreras / Operativo Ventas (TPS):</strong><div style="display:contents" dir="auto"><ul id="32d39073-1e23-80e3-8a3d-e062aea3b721" class="bulleted-list"><li style="list-style-type:circle"><strong>Fallo:</strong> En ambos casos usa la misma frase: <em>&quot;Iniciemos porfa ubicando este icono... mientras termino el remoto con otro local&quot;</em>.</li></ul></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-80d9-b560-e120f8cd7da2" class="bulleted-list"><li style="list-style-type:circle"><strong>Comentario:</strong> <em>&quot;Gestión transaccional. Se evidencia al cliente que está en &#x27;segundo plano&#x27; mientras se atiende a otro local. Si bien la multitarea es necesaria, la comunicación de esta degrada la percepción de atención personalizada y prioritaria.&quot;</em></li></ul></div></li></ul></div><div style="display:contents" dir="auto"><h3 id="32d39073-1e23-804a-8ea2-e6e23d927443" class="">5. Barreras en lugar de Soluciones</h3></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-80d5-bfbe-c1d48a332d1c" class="bulleted-list"><li style="list-style-type:disc"><strong>Caso Emilio Luna (Perfiles):</strong><div style="display:contents" dir="auto"><ul id="32d39073-1e23-80f3-976a-c30c2a131044" class="bulleted-list"><li style="list-style-type:circle"><strong>Fallo:</strong> El cliente quiere crear un perfil. La respuesta de Daniela es un &quot;No es posible&quot; rotundo y una explicación de por qué ella no puede.</li></ul></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-809a-bcb6-fe7d07ed1b67" class="bulleted-list"><li style="list-style-type:circle"><strong>Comentario:</strong> <em>&quot;Comunicación negativa. Se enfoca la respuesta en la limitación (&#x27;No es posible&#x27;, &#x27;No me permite&#x27;) en lugar de guiar al cliente proactivamente sobre el flujo correcto a seguir con el administrador del local.&quot;</em></li></ul></div></li></ul></div></details></li></ul></div><div style="display:contents" dir="auto"><hr id="32d39073-1e23-8051-bb71-efeec4eab0d4"/></div><div style="display:contents" dir="auto"><h4 id="32d39073-1e23-80cc-a79d-e2582c0b667a" class="">Conectando el feedback de Diciembre 2025</h4></div><div style="display:contents" dir="auto"><p id="32d39073-1e23-807f-936d-e468f44cd9f2" class="">En diciembre te sentías superada con una carga mucho menor (125 semana versus 400 por semana) 👏🏻👏🏻👏🏻</p></div><div style="display:contents" dir="auto"><p id="32d39073-1e23-8076-8b42-d2f1b77e3a6a" class="">Hoy estás manejando un volumen digno de un senior, lo cual habla de tu crecimiento. Eres mucho más productiva, pero te olvidaste de las reglas de oro de calidad que acordamos. </p></div><div style="display:contents" dir="auto"><p id="32d39073-1e23-808d-880e-e214d79ee1ab" class="">Si recuperas el hábito de no cerrar sin confirmar, tus números serán los mejores del equipo.</p></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="32d39073-1e23-8023-af9b-e27cba2d6ee0"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%"><div style="display:contents" dir="auto"><p id="32d39073-1e23-80d4-b7da-cad67f9ef042" class=""><strong>Compromisos y acuerdo de metas</strong></p></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-8072-9712-d7e933bbb47a" class="bulleted-list"><li style="list-style-type:disc"><strong>Dejar de correr</strong></li></ul></div><div style="display:contents" dir="auto"><p id="32d39073-1e23-8086-9261-f58dc0642e9e" class="">Estabilizar el TME en 25s pero asegurar la experiencia completa. Es mejor responder 5 segundos después pero resolver bien.</p></div><div style="display:contents" dir="auto"><ul id="32d39073-1e23-805a-a98a-e387dd19f6c3" class="bulleted-list"><li style="list-style-type:disc"><strong>Protocolo de Cierre</strong></li></ul></div><div style="display:contents" dir="auto"><p id="32d39073-1e23-80eb-9602-fde3958676e5" class="">Prohibido cerrar un ticket de &quot;Impresión&quot; sin la frase: </p></div><div style="display:contents" dir="auto"><blockquote id="32d39073-1e23-80af-a3b0-c3be220c70bd" class=""><em>¿Le imprimió correctamente la prueba? Me quedo atento a su confirmación para cerrar el caso&quot;</em></blockquote></div></div></figure></div></details></li></ul></div><div style="display:contents" dir="auto"><p id="2d539073-1e23-8019-8396-e72c8cebedf9" class="">
</p></div><div style="display:contents" dir="auto"><p id="2d539073-1e23-80b3-8796-d3623d065d66" class="">
</p></div></div></article><span class="sans" style="font-size:14px;padding-top:2em"></span></body></html>
