div style="display:contents" dir="auto"><h3 id="2f039073-1e23-80f9-b362-f3febc84ef70" class=""><strong>Sensación general a la fecha del compañero</strong></h3></div><div style="display:contents" dir="auto"><p id="2f439073-1e23-805c-9084-e2f6070289f9" class="">Incide la carga. </p></div><div style="display:contents" dir="auto"><p id="2f439073-1e23-801a-85d4-c1fa370193bb" class="">Complejo encontrar casos que sean representativos para usar como comparativo, porque estando cerrados no sabemos si estaban en alta o baja carga.</p></div><div style="display:contents" dir="auto"><p id="2f439073-1e23-8091-a911-eb624baf6a74" class="">Entiende que no es por desconocimiento, más bien por buscar la forma más humana, social de decir las cosas. Debe recordar que no es frustración con él, si no por la situación. </p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-809b-9fe7-c3f88723d842" class=""><br/><strong>Dato: </strong>en Diciembre estuvo la afectación de su papá. </p></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="2f039073-1e23-804b-811a-dd501acabf44"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%"><div style="display:contents" dir="auto"><h3 id="2f039073-1e23-808b-b602-ddde1de095c8" class=""><strong>Indicadores a la fecha </strong></h3></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-80f0-8d75-e7d22b42d79a" class=""><strong>CSAT: </strong></p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-80e6-87bf-fedfa8f5d191" class="">90.7% en noviembre</p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-801f-9466-d2408ff5bf59" class="">90.2% en diciembre<div class="indented"><div style="display:contents" dir="auto"><p id="2f039073-1e23-80aa-bd16-c625393fa2d2" class="">promedio equipo: <strong>96.9% en diciembre.</strong></p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-80b6-85fc-f1f6987d5f63" class="">brecha:  6,7 puntos</p></div></div></p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-80d7-b9d5-ee25cb28b7b5" class=""><br/><strong>TME: </strong></p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-80e9-8128-d94d12389320" class="">57.5% en noviembre</p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-809e-a249-d4d8de41bdb8" class="">62.6% en diciembre<div class="indented"><div style="display:contents" dir="auto"><p id="2f039073-1e23-8011-a47c-e99f3aa3a61c" class="">promedio equipo: <strong>70.7% </strong>en diciembre</p></div></div></p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-802b-85af-ee9751aec940" class="">
</p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-8072-9b3c-f6aab1ac8687" class=""><strong>TMO: </strong></p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-802f-aba6-eeb21f9cb68b" class="">78.9% en noviembre</p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-803f-918c-fd5cd71d70d5" class="">83.2%<strong> </strong>en diciembre<div class="indented"><div style="display:contents" dir="auto"><p id="2f039073-1e23-80c4-bea1-e9d77f2b7d13" class="">promedio equipo: <strong>76%</strong> en diciembre</p></div></div></p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-80aa-88dc-fa8fda28a819" class="">
</p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-80df-a965-de4d34ea14de" class=""><strong>CX Score: </strong></p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-802b-9677-d7fbd2524628" class=""><strong>3.9 </strong>en noviembre</p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-8073-b7ca-ded582ab8241" class=""><strong>3.7 </strong>en diciembre<div class="indented"><div style="display:contents" dir="auto"><p id="2f039073-1e23-802b-ae76-ff64468b511c" class="">promedio equipo: 3.8</p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-8004-b913-c4a9ed6f67c3" class="">ranking en el equipo: 12 / 19</p></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-803c-a085-ca0bceeead9e" class="">top equipo 4.1 </p></div></div></p></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="2f039073-1e23-80ad-aab6-ceff9cc76120"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%"><div style="display:contents" dir="auto"><h3 id="2f039073-1e23-8041-90ba-e3abefe26e97" class=""><strong>Análisis del desempeño</strong></h3></div><div style="display:contents" dir="auto"><ul id="2f039073-1e23-80c3-ad73-feb641e0b07c" class="bulleted-list"><li style="list-style-type:disc">Resumen diciembre del CX Score: <div style="display:contents" dir="auto"><ul id="2f039073-1e23-80d5-9412-c2a2a3ff7b2e" class="bulleted-list"><li style="list-style-type:circle">Emmanuel muestra una tendencia altamente resolutiva, especialmente en situaciones donde la inteligencia artificial inicial falla.<div style="display:contents" dir="ltr"><table id="2f039073-1e23-8060-b129-dc32d2ad16e1" class="simple-table"><tbody><div style="display:contents" dir="ltr"><tr id="2f039073-1e23-80e3-b564-ef8bde55d701"><td id="POg{" class=""><strong>Categoría</strong></td><td id="n|u&gt;" class=""><strong>Tendencia Observada</strong></td><td id="bqVb" class=""><strong>Estado de Resolución</strong></td></tr></div><div style="display:contents" dir="ltr"><tr id="2f039073-1e23-8096-bc01-e52a28d543cd"><td id="POg{" class=""><strong>Hardware e Impresión</strong></td><td id="n|u&gt;" class="">El motivo #1 (aprox. 45%). Incluye desconfiguración tras cortes de luz, cambio de routers y falta de papel.</td><td id="bqVb" class=""><strong>Alta.</strong> Emmanuel identifica rápidamente si el fallo es del software o físico del cableado.</td></tr></div><div style="display:contents" dir="ltr"><tr id="2f039073-1e23-80e0-b8dd-eedb8dc644e1"><td id="POg{" class=""><strong>Facturación Electrónica</strong></td><td id="n|u&gt;" class="">Problemas con el CUFE, códigos QR y resoluciones de folios vencidas.</td><td id="bqVb" class=""><strong>Media.</strong> Muchos casos dependen de la DIAN o el SII, lo que genera frustración externa al agente.</td></tr></div><div style="display:contents" dir="ltr"><tr id="2f039073-1e23-8043-978e-f888862a388c"><td id="POg{" class=""><strong>Permisos y Seguridad</strong></td><td id="n|u&gt;" class="">Consultas sobre por qué un garzón no puede abrir/cerrar turno o caja.</td><td id="bqVb" class=""><strong>Informativa.</strong> Emmanuel es estricto en explicar que ciertas funciones son exclusivas del &quot;Dueño&quot;.</td></tr></div><div style="display:contents" dir="ltr"><tr id="2f039073-1e23-800e-afdd-d8f33695d0a9"><td id="POg{" class=""><strong>Inventarios y Recetas</strong></td><td id="n|u&gt;" class="">Dudas sobre Kardex y costos de ingredientes.</td><td id="bqVb" class=""><strong>Alta.</strong> Se apoya mucho en el envío de guías y artículos del centro de ayuda.</td></tr></div></tbody></table></div></li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="2f039073-1e23-80f9-b2ea-d0c4bd50b33f" class="bulleted-list"><li style="list-style-type:disc">Aunque es resolutivo técnicamente, el análisis revela que su bajo CSAT no se debe a la falta de conocimiento, sino <strong>a cómo comunica las limitaciones del sistema y cómo cierra los casos.</strong><div style="display:contents" dir="auto"><ul id="2f039073-1e23-8088-a709-de1e2b074d1a" class="bulleted-list"><li style="list-style-type:circle">Aquí los 3 patrones críticos que están afectando su puntaje:<strong><br/></strong></li></ul></div><div style="display:contents" dir="auto"><ol type="1" id="2f039073-1e23-80f6-8be4-c1e812837535" class="numbered-list" start="1"><li><strong>El &quot;Efecto Muro&quot; (Falta de Empatía en Políticas)</strong><br/>Emmanuel tiende a ser muy normativo. Cuando un cliente está en medio de un servicio caótico y no puede hacer algo (ej. &quot;solo el dueño puede reabrir el turno&quot;), su respuesta es técnica y definitiva, pero carece de <strong>validación emocional</strong>.<div style="display:contents" dir="auto"><ol type="a" id="2f039073-1e23-8065-a798-e6ad8ea957cc" class="numbered-list" start="1"><li><strong>El patrón:</strong> El cliente expresa urgencia/frustración → Emmanuel responde con la regla de permisos → El cliente se siente &quot;abandonado&quot; por el sistema.</li></ol></div><div style="display:contents" dir="auto"><ol type="a" id="2f039073-1e23-80d8-a16f-e7aef0ac4f40" class="numbered-list" start="2"><li><strong>Impacto en CSAT:</strong> El cliente califica bajo no porque Emmanuel mintiera, sino porque sintió que el agente no intentó buscar una alternativa o &quot;sentir&quot; su urgencia.</li></ol></div></li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="2f039073-1e23-8018-b7d1-e0798a0816af" class="numbered-list" start="2"><li><strong>Cierres Prematuros (Falta de Confirmación)</strong><br/>En el resumen se repite mucho la frase: <em>&quot;El agente proporcionó instrucciones... pero el cliente no confirmó la resolución&quot;</em>.<div style="display:contents" dir="auto"><ol type="a" id="2f039073-1e23-8096-850b-ce27d0a68742" class="numbered-list" start="1"><li><strong>El patrón:</strong> Emmanuel da la solución técnica y, si el cliente tarda en responder (posiblemente porque está probando la solución o atendiendo una mesa), el caso se cierra.</li></ol></div><div style="display:contents" dir="auto"><ol type="a" id="2f039073-1e23-8039-a996-c71fb1285cea" class="numbered-list" start="2"><li><strong>Impacto en CSAT:</strong> Muchos clientes califican negativo cuando sienten que el agente &quot;se escapó&quot; del chat antes de que ellos pudieran verificar que todo funcionaba. El equipo (promedio 96.9%) probablemente espera una confirmación activa antes de cerrar.</li></ol></div></li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="2f039073-1e23-8088-aa54-cd2975ce7f3e" class="numbered-list" start="3"><li><strong>Explicaciones Técnicas vs. Soluciones Operativas</strong><br/>Se observa que Emmanuel explica el <strong>&quot;por qué&quot;</strong> falla algo (ej. &quot;es un problema de su internet&quot;), pero no siempre guía al cliente hacia el <strong>&quot;qué hacer ahora&quot;</strong> para seguir operando.<div style="display:contents" dir="auto"><ol type="a" id="2f039073-1e23-8098-bba2-ce320da68580" class="numbered-list" start="1"><li><strong>Ejemplo detectado:</strong> En problemas de impresión, se limita a decir que es un fallo físico/externo. Un agente con CSAT alto suele decir: <em>&quot;Entiendo que es frustrante, mientras revisas el cable, podrías comandar temporalmente desde este otro terminal para no detener tu venta&quot;</em>.</li></ol></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-80dc-89e8-f99ca5512075" class="">
</p></div></li></ol></div></li></ul></div><div style="display:contents" dir="auto"><ul id="2f039073-1e23-808c-b5fb-ce1bb1b7e198" class="bulleted-list"><li style="list-style-type:disc">Hallazgos de casos auditados<div style="display:contents" dir="auto"><ul id="2f039073-1e23-807b-9184-e9a3237972c3" class="bulleted-list"><li style="list-style-type:circle"><a href="https://app.intercom.com/a/inbox/nry7bg4q/inbox/conversation/215472767618084?view=List">Sabor andino</a> - Faltó claridad y comunicación asertiva. CX 1. </li></ul></div><div style="display:contents" dir="auto"><ul id="2f039073-1e23-800a-b204-c8d07b419a7a" class="bulleted-list"><li style="list-style-type:circle"><a href="https://app.intercom.com/a/inbox/nry7bg4q/inbox/conversation/215471906304023">Cefetería 2K</a> - No se abordó bien la pregunta. CX 2.</li></ul></div><div style="display:contents" dir="auto"><ul id="2f039073-1e23-8031-8db6-edeb5edc84fd" class="bulleted-list"><li style="list-style-type:circle"><a href="https://app.intercom.com/a/inbox/nry7bg4q/inbox/conversation/215472704672504">La Burguesia</a> - Trato poco amable. CX 2. </li></ul></div></li></ul></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-yellow_background callout" style="white-space:pre-wrap;display:flex" id="2f039073-1e23-80cc-b3cd-fefb94540f90"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%"><div style="display:contents" dir="auto"><h3 id="2f039073-1e23-80c0-935f-f99e98a4c6c8" class="">Sugerencias de Acción (Next Steps)</h3></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-80a4-ad10-e0c236e59133" class="">Para elevar su CSAT, Emmanuel no necesita estudiar más el manual, necesita <strong>ajustar el tono de su comunicación</strong>:</p></div><div style="display:contents" dir="auto"><ol type="1" id="2f039073-1e23-80ba-8768-c7b4d1aecb89" class="numbered-list" start="1"><li><strong>Uso de frases de transición:</strong> Implementar frases como <em>&quot;Entiendo que esto detiene tu operación, vamos a resolverlo juntos&quot;</em> antes de dar la instrucción técnica.</li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="2f039073-1e23-8052-9ba1-d2987cc8ee54" class="numbered-list" start="2"><li><strong>Protocolo de espera activa:</strong> No cerrar casos de hardware (impresoras) hasta tener un &quot;OK&quot; explícito, ya que son los que generan más frustración residual.</li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="2f039073-1e23-8032-8241-e5aac85a20d5" class="numbered-list" start="3"><li><strong>Análisis de &quot;No puedo&quot;:</strong> Cambiar el <em>&quot;No se puede&quot;</em> por <em>&quot;Actualmente el sistema funciona así por seguridad, pero lo que podemos hacer es...&quot;</em>.</li></ol></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="2f039073-1e23-80a7-b9a3-d6c0c552928e"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%"><div style="display:contents" dir="auto"><p id="2f039073-1e23-80f3-85f6-fe2e39e86e77" class=""><strong>Compromisos y acuerdo de metas</strong></p></div><div style="display:contents" dir="auto"><ol type="1" id="2f039073-1e23-8089-935c-ff670577d79a" class="numbered-list" start="1"><li>Compromiso 1: Revisar pdf “Actitud de Servicio”.</li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="2f039073-1e23-8029-98e4-ffbb0338d61e" class="numbered-list" start="2"><li>Compromiso 2: Elevar 3 puntos de CSAT (<span style="border-bottom:0.05em solid">&gt;</span> 93.5%)</li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="2f039073-1e23-804d-98c1-c075603ee4a6" class="numbered-list" start="3"><li>Compromiso 3: Elevar el CX Score a <span style="border-bottom:0.05em solid">&gt;</span> 3.9</li></ol></div></div></figure></div></details></li></ul></div><div style="display:contents" dir="auto"><p id="2f039073-1e23-80e9-8210-e9deee12bd0a" class="">
