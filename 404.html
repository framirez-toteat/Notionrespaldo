<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Archivo no disponible</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f7f6f4; display: flex; align-items: center;
    justify-content: center; height: 100vh;
  }
  .box {
    background: #fff; border-radius: 12px; padding: 40px 48px;
    text-align: center; max-width: 480px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h2 { font-size: 20px; color: #1a1a1a; margin-bottom: 8px; }
  p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 24px; }
  a {
    display: inline-block; padding: 10px 24px;
    background: #e8411c; color: #fff; border-radius: 7px;
    text-decoration: none; font-size: 14px; font-weight: 600;
  }
  a:hover { background: #c73518; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">🎬</div>
  <h2>Archivo no disponible</h2>
  <p>Este archivo (probablemente un video) no pudo ser incluido en el sitio porque supera el límite de tamaño de GitHub Pages (100 MB).<br><br>Puedes encontrarlo en la página original de Notion.</p>
  <a href="/">← Volver al inicio</a>
</div>
</body>
</html>
